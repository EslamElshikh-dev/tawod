name: Site Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static HTML and SEO validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/tawod-inner.js
          node --check assets/js/tawod-upgrades.js
          node --check scripts/build-static-pages.mjs
          node --check scripts/validate-site.mjs
      - name: Generate static HTML
        run: node scripts/build-static-pages.mjs
      - name: Validate pages links metadata schema and sitemap
        run: node scripts/validate-site.mjs
      - name: Detect unresolved merge markers
        run: |
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --exclude-dir=.git .; then
            echo 'Unresolved merge markers found.'
            exit 1
          fi
      - name: Reject oversized changed web assets
        run: |
          git diff --name-only --diff-filter=ACMR origin/main...HEAD > /tmp/changed-files.txt
          python3 - <<'PY'
          from pathlib import Path
          limits={'.html':350000,'.css':250000,'.js':350000,'.webp':1200000,'.avif':1200000,'.png':1500000,'.jpg':1500000,'.jpeg':1500000}
          errors=[]
          changed=Path('/tmp/changed-files.txt').read_text().splitlines()
          for name in changed:
              file=Path(name)
              if not file.is_file():
                  continue
              limit=limits.get(file.suffix.lower())
              if limit and file.stat().st_size>limit:
                  errors.append(f'{file}: {file.stat().st_size} bytes exceeds {limit}')
          if errors:
              print('\n'.join(errors))
              raise SystemExit(1)
          print(f'Asset-size checks passed for {len(changed)} changed files.')
          PY
      - name: Commit generated HTML to pull request branch
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet; then
            echo "Static HTML is already committed."
            node scripts/build-static-pages.mjs --check
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html' 'blog/**/*.html' 'lp/**/*.html'
          git commit -m "Generate static content FAQ and schema"
          git push origin HEAD:${{ github.head_ref }}
